spring.application.name=players
server.port=${PORT:8081}

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Database Connection
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- CRITICAL: DATA INITIALIZATION SETTINGS ---
# 1. This ensures Hibernate creates the table first
spring.jpa.hibernate.ddl-auto=create
# 2. This tells Spring to look for 'data.sql' and run it
spring.sql.init.mode=always
# 3. This forces the SQL to run AFTER the table is ready
spring.jpa.defer-datasource-initialization=true